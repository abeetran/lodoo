version: "3.5"
services:
  odoo:
    build:
      context: ./addons
    container_name: odoo_tik
    environment:
      HOST: ${HOST:-db}
      PASSWORD: ${PASSWORD:-odoo}
    networks:
      - coolify
    volumes:
      - ./odoo-web-data:/var/lib/odoo
    restart: unless-stopped
networks:
  coolify:
    external: true
